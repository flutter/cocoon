name: flutter_dashboard
description: The Flutter dashboard.
publish_to: none
version: 1.1.0+2

resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  cached_network_image: ^3.4.1
  cached_network_image_platform_interface: ^4.1.1
  cocoon_common:
    path: ../packages/cocoon_common
  cocoon_integration_test:
    path: ../packages/cocoon_integration_test
  cocoon_service: ^0.0.0
  collection: any # Match Flutter SDK
  crypto: ^3.0.7
  firebase_auth: ^6.0.0
  firebase_core: ^4.4.0 # Rolled by dependabot
  firebase_crashlytics: 5.0.6 # Rolled by dependabot
  flutter:
    sdk: flutter
  flutter_app_icons: 0.1.1 # Rolled by dependabot
  github: ^9.25.0
  google_sign_in: ^7.0.0
  google_sign_in_platform_interface: ^3.0.0
  google_sign_in_web: ^1.0.0
  googleapis: ^14.0.0
  http: 1.6.0 # Rolled by dependabot
  intl: ^0.20.2
  json_annotation: ^4.9.0
  meta: any # Match Flutter SDK
  provider: 6.1.5 # Rolled by dependabot
  sign_in_button: ^4.0.1
  truncate: 3.0.1 # Rolled by dependabot
  url_launcher: 6.3.2 # Rolled by dependabot
  url_launcher_platform_interface: 2.3.2 # Rolled by dependabot
  url_launcher_web: 2.4.2 # Rolled by dependabot

dev_dependencies:
  build_runner: ^2.4.15 # Rolled by dependabot
  cocoon_server_test: ^0.0.0
  dart_flutter_team_lints: 3.5.2
  flutter_test:
    sdk: flutter
  mockito: ^5.4.6
  path: any # Match Flutter SDK

flutter:
  uses-material-design: true
  assets:
    - assets/
